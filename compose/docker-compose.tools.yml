# ===========================================================================
# Tools-friendly variant — use this compose instead of the default
# docker-compose.yml when your application needs working OpenAI-compatible
# tool calling (`tools: [...]` in the request → `tool_calls: [...]` in the
# response).
#
# Trade-off vs the default:
#
#   Variant                 Max ctx   Short-prompt TPS   Tools   Vision
#   ───────────────────────────────────────────────────────────────────
#   default (this repo)       125K       85 / 106          ❌       ✅
#   tools (this file)          20K       63 / 80           ✅       ✅
#
# Why: MTP speculative decoding × any TurboQuant KV preset (turboquant_3bit_nc,
# turboquant_4bit_nc, turboquant_k8v4) causes the model to collapse into
# <tool_call> token loops on tool-schema prompts. Swapping to fp8_e5m2 KV keeps
# MTP intact and restores tool calling, at the cost of ~6× less context
# (20K vs 125K). Confirmed via scripts/verify.sh on 2026-04-24.
#
# If you need BOTH 125K context AND tools, remove the --speculative-config
# line entirely (turns off MTP). That yields 125K + tools at ~40-50 TPS.
#
# Run with:
#   cd compose
#   docker compose -f docker-compose.tools.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b:
    # Pinned to the exact nightly we tested and the Genesis patches verified against.
    image: vllm/vllm-openai@sha256:9bba4628a3b943e0dd33caefb94b811569ba1e97bdf23bee19a265c31b947ccb
    container_name: vllm-qwen36-27b
    restart: "no"
    ports:
      - "8020:8000"
    volumes:
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
      - ../patches/genesis/patch_genesis_unified.py:/patches/patch_genesis_unified.py:ro
      - ../patches/patch_tolist_cudagraph.py:/patches/patch_tolist_cudagraph.py:ro
    environment:
      # Uncomment the next line to pin to a specific GPU (e.g. GPU 0):
      # - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install xxhash -q
        python3 /patches/patch_genesis_unified.py
        python3 /patches/patch_tolist_cudagraph.py
        exec vllm serve "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "20000"
      - --gpu-memory-utilization
      - "0.95"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "2048"
      # fp8_e5m2 KV — NOT turboquant — because MTP + turboquant collapses on tool-call prompts.
      - --kv-cache-dtype
      - fp8_e5m2
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
